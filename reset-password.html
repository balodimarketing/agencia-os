<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faro — Nueva contraseña</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    .pass-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94A3B8; padding: 0; font-size: 16px; }
    .field-pass { position: relative; }
    .field-pass input { padding-right: 40px; }
    .strength-bar { height: 4px; border-radius: 2px; background: #E2E8F0; margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .3s, background .3s; }
    .strength-text { font-size: 11px; margin-top: 4px; font-weight: 600; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="card" id="card-form">

    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 22 22">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="12" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="12" width="7" height="7" rx="1.5"/>
          <rect x="12" y="12" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <span class="logo-name">Faro</span>
    </div>

    <h1 class="card-title">Nueva contraseña</h1>
    <p class="card-sub">Ingresá tu nueva contraseña para acceder a Faro.</p>

    <div class="error-msg" id="error"></div>

    <div class="field">
      <label>Nueva contraseña</label>
      <div class="field-pass">
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" oninput="checkStrength(this.value)">
        <button class="pass-toggle" type="button" onclick="togglePass()" tabindex="-1">
          <i class="ti ti-eye" id="eye-icon"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-text" id="strength-text" style="color:#94A3B8"></div>
    </div>

    <div class="field">
      <label>Repetir contraseña</label>
      <div class="field-pass">
        <input type="password" id="password2" placeholder="Repetí la contraseña" autocomplete="new-password">
      </div>
    </div>

    <button class="btn btn-primary" id="btn-reset" onclick="handleReset()" style="margin-top:8px">
      <span id="btn-text">Guardar nueva contraseña</span>
      <div class="spinner" id="spinner"></div>
    </button>

  </div>

  <!-- Estado: error de link -->
  <div class="card" id="card-link-error" style="display:none;text-align:center;padding:44px">
    <div class="logo" style="justify-content:center">
      <div class="logo-mark">
        <svg viewBox="0 0 22 22">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="12" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="12" width="7" height="7" rx="1.5"/>
          <rect x="12" y="12" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <span class="logo-name">Faro</span>
    </div>
    <div style="font-size:36px;margin-bottom:16px">⚠️</div>
    <div style="font-size:18px;font-weight:900;color:#111;margin-bottom:8px">Link inválido o vencido</div>
    <div style="font-size:13px;color:#9AA5B4;margin-bottom:24px;line-height:1.6">El link de recuperación expiró o ya fue usado.<br>Pedí uno nuevo desde la pantalla de login.</div>
    <a href="login.html" class="btn btn-primary" style="text-decoration:none;display:flex">Volver al login</a>
  </div>

  <!-- Estado: éxito -->
  <div class="card" id="card-success" style="display:none;text-align:center;padding:44px">
    <div class="logo" style="justify-content:center">
      <div class="logo-mark">
        <svg viewBox="0 0 22 22">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="12" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="12" width="7" height="7" rx="1.5"/>
          <rect x="12" y="12" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <span class="logo-name">Faro</span>
    </div>
    <div style="font-size:36px;margin-bottom:16px">✅</div>
    <div style="font-size:18px;font-weight:900;color:#111;margin-bottom:8px">¡Contraseña actualizada!</div>
    <div style="font-size:13px;color:#9AA5B4;margin-bottom:24px">Ya podés ingresar con tu nueva contraseña.</div>
    <a href="login.html" class="btn btn-primary" style="text-decoration:none;display:flex">Ir al login</a>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const supabase = createClient(
    'https://trsbjjagrpvlzvcveiph.supabase.co',
    'sb_publishable_unJoCAXBOTCiLpLkFCG2oA_SdRcKHit'
  )

  // Supabase manda el token en el hash de la URL
  // Hay que dejar que el SDK lo procese automáticamente
  const { data: { session }, error } = await supabase.auth.getSession()

  // Si no hay sesión activa después del redirect, el link es inválido
  if (!session) {
    // Intentar procesar el hash manualmente
    const hashParams = new URLSearchParams(window.location.hash.replace('#', ''))
    const accessToken = hashParams.get('access_token')
    const refreshToken = hashParams.get('refresh_token')
    const type = hashParams.get('type')

    if (accessToken && type === 'recovery') {
      const { error: setErr } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      })
      if (setErr) {
        document.getElementById('card-form').style.display = 'none'
        document.getElementById('card-link-error').style.display = 'block'
      }
    } else {
      document.getElementById('card-form').style.display = 'none'
      document.getElementById('card-link-error').style.display = 'block'
    }
  }

  window.togglePass = function() {
    const input = document.getElementById('password')
    const icon = document.getElementById('eye-icon')
    if (input.type === 'password') {
      input.type = 'text'
      icon.className = 'ti ti-eye-off'
    } else {
      input.type = 'password'
      icon.className = 'ti ti-eye'
    }
  }

  window.checkStrength = function(val) {
    const fill = document.getElementById('strength-fill')
    const text = document.getElementById('strength-text')
    if (!val) { fill.style.width = '0'; text.textContent = ''; return }
    let score = 0
    if (val.length >= 8) score++
    if (val.length >= 12) score++
    if (/[A-Z]/.test(val)) score++
    if (/[0-9]/.test(val)) score++
    if (/[^A-Za-z0-9]/.test(val)) score++
    const levels = [
      { pct: '20%', color: '#EF4444', label: 'Muy débil' },
      { pct: '40%', color: '#F97316', label: 'Débil' },
      { pct: '60%', color: '#EAB308', label: 'Regular' },
      { pct: '80%', color: '#22C55E', label: 'Buena' },
      { pct: '100%', color: '#16A34A', label: 'Excelente' },
    ]
    const level = levels[Math.min(score - 1, 4)] || levels[0]
    fill.style.width = level.pct
    fill.style.background = level.color
    text.textContent = level.label
    text.style.color = level.color
  }

  window.handleReset = async function() {
    const password  = document.getElementById('password').value
    const password2 = document.getElementById('password2').value
    const errEl     = document.getElementById('error')
    const btn       = document.getElementById('btn-reset')
    const spinner   = document.getElementById('spinner')
    const btnText   = document.getElementById('btn-text')

    errEl.classList.remove('show')

    if (password.length < 8) {
      errEl.textContent = 'La contraseña debe tener al menos 8 caracteres.'
      errEl.classList.add('show'); return
    }
    if (password !== password2) {
      errEl.textContent = 'Las contraseñas no coinciden.'
      errEl.classList.add('show'); return
    }

    btn.disabled = true; spinner.style.display = 'block'; btnText.textContent = 'Guardando...'

    const { error } = await supabase.auth.updateUser({ password })

    if (error) {
      btn.disabled = false; spinner.style.display = 'none'; btnText.textContent = 'Guardar nueva contraseña'
      errEl.textContent = error.message || 'Error al actualizar la contraseña.'
      errEl.classList.add('show'); return
    }

    document.getElementById('card-form').style.display = 'none'
    document.getElementById('card-success').style.display = 'block'
  }
</script>

</body>
</html>
