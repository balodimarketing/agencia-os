<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faro — Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="auth-page">
  <div class="card">

    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 22 22">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="12" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="12" width="7" height="7" rx="1.5"/>
          <rect x="12" y="12" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <span class="logo-name">Faro</span>
    </div>

    <h1 class="card-title">Bienvenido de nuevo</h1>
    <p class="card-sub">Ingresá a tu agencia.</p>

    <div class="error-msg" id="error"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">
      <span id="btn-text">Iniciar sesión</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="card-footer">
      ¿No tenés cuenta? <a href="register.html">Registrate gratis</a>
    </div>

  </div>
</div>

<script type="module">
  import { supabase, redirectIfAuth } from './supabase.js'

  // Si ya tiene sesión activa, redirigir
  redirectIfAuth()

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin()
  })

  window.handleLogin = async function() {
    const email    = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const btn      = document.getElementById('btn-login')
    const spinner  = document.getElementById('spinner')
    const btnText  = document.getElementById('btn-text')
    const errEl    = document.getElementById('error')

    errEl.classList.remove('show')

    if (!email || !password) {
      errEl.textContent = 'Completá todos los campos.'
      errEl.classList.add('show')
      return
    }

    btn.disabled = true
    spinner.style.display = 'block'
    btnText.textContent = 'Ingresando...'

    const { data, error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) {
      btn.disabled = false
      spinner.style.display = 'none'
      btnText.textContent = 'Iniciar sesión'
      errEl.textContent = 'Email o contraseña incorrectos.'
      errEl.classList.add('show')
      return
    }

    // redirectIfAuth se encarga de mandar al lugar correcto
    await redirectIfAuth()
  }
</script>

</body>
</html>
