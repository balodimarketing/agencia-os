<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faro — Mi portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --azul: #0A2540; --celeste: #8EDBFF; --cel-dim: rgba(142,219,255,.12);
      --white: #FFFFFF; --bg: #F5F7FA; --ink: #111111; --ink2: #4A5568; --ink3: #9AA5B4;
      --border: #E8ECF0; --success: #34C759; --danger: #FF6B6B; --warn: #FFB800;
      --r: 12px; --r-lg: 16px; --shadow: 0 4px 24px rgba(0,0,0,.07); --shadow-lg: 0 12px 48px rgba(0,0,0,.12);
      --t: .18s cubic-bezier(.4,0,.2,1);
    }
    html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
    .shell { display: flex; height: 100vh; overflow: hidden; }

    /* Rail */
    .rail { width: 62px; background: var(--azul); display: flex; flex-direction: column; align-items: center; padding: 14px 0; flex-shrink: 0; z-index: 30; gap: 4px; border-radius: 0 0 16px 0; }
    .rail-logo { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; cursor: pointer; flex-shrink: 0; }
    .rail-sep { width: 28px; height: 1px; background: rgba(142,219,255,.12); margin: 6px 0; flex-shrink: 0; }
    .rail-btn { width: 42px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background var(--t), color var(--t); color: rgba(142,219,255,.55); position: relative; }
    .rail-btn i { font-size: 19px; }
    .rail-btn:hover { background: rgba(142,219,255,.1); color: rgba(142,219,255,.85); }
    .rail-btn.active { background: rgba(142,219,255,.18); color: var(--celeste); box-shadow: inset 0 0 0 1px rgba(142,219,255,.15); }
    .rail-btn::after { content: attr(data-tip); position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%); background: var(--ink); color: #fff; font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 7px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity var(--t); z-index: 100; }
    .rail-btn:hover::after { opacity: 1; }
    .rail-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .rail-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; cursor: pointer; letter-spacing: -.3px; border: 1.5px solid rgba(142,219,255,.25); }
    .notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--danger); border: 1.5px solid var(--azul); display: none; }
    .notif-dot.show { display: block; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: 52px; flex-shrink: 0; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
    .topbar-title { font-size: 16px; font-weight: 900; color: var(--ink); letter-spacing: -.3px; }
    .content { flex: 1; overflow-y: auto; padding: 28px; }

    /* Header bienvenida */
    .welcome-header {
      background: var(--azul);
      border-radius: var(--r-lg);
      padding: 28px 32px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .welcome-left { display: flex; align-items: center; gap: 18px; }
    .welcome-avatar {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(142,219,255,.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: var(--celeste);
      flex-shrink: 0; letter-spacing: -.5px;
    }
    .welcome-greeting { font-size: 11px; font-weight: 700; color: rgba(142,219,255,.6); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
    .welcome-name { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -.4px; margin-bottom: 3px; }
    .welcome-agency { font-size: 13px; color: rgba(142,219,255,.6); }
    .welcome-right { display: flex; gap: 12px; }
    .welcome-stat { text-align: center; }
    .welcome-stat-val { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -.5px; line-height: 1; }
    .welcome-stat-label { font-size: 10px; font-weight: 700; color: rgba(142,219,255,.5); text-transform: uppercase; letter-spacing: .6px; margin-top: 4px; }
    .welcome-stat-divider { width: 1px; background: rgba(142,219,255,.12); margin: 4px 0; }

    /* Approval banner */
    .approval-banner {
      background: #FFF7ED; border: 1.5px solid #FED7AA;
      border-radius: var(--r-lg); padding: 18px 22px;
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    }
    .approval-banner-icon { width: 40px; height: 40px; background: #F97316; border-radius: 11px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; flex-shrink: 0; }
    .approval-banner-title { font-size: 14px; font-weight: 900; color: #92400E; margin-bottom: 3px; }
    .approval-banner-sub { font-size: 12px; color: #B45309; }
    .approval-banner-btn { margin-left: auto; padding: 9px 18px; background: #92400E; color: #fff; border: none; border-radius: var(--r); font-size: 12px; font-weight: 800; cursor: pointer; font-family: inherit; transition: opacity var(--t); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .approval-banner-btn:hover { opacity: .85; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
    .stat-label { font-size: 10px; font-weight: 800; color: var(--ink3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
    .stat-value { font-size: 26px; font-weight: 900; color: var(--ink); letter-spacing: -.5px; line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--ink3); margin-top: 4px; }

    /* Section */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 14px; font-weight: 900; color: var(--ink); letter-spacing: -.2px; }
    .section-sub { font-size: 12px; color: var(--ink3); margin-top: 2px; }

    /* Piece cards */
    .pieces-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .piece-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; cursor: pointer; transition: box-shadow var(--t), border-color var(--t), transform var(--t); }
    .piece-card:hover { box-shadow: var(--shadow); border-color: #D0DCE8; transform: translateY(-1px); }
    .piece-card.needs-approval { border: 1.5px solid #F97316; }
    .piece-thumb { width: 100%; aspect-ratio: 1/1; background: var(--bg); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .piece-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .piece-thumb-overlay { position: absolute; inset: 0; background: rgba(249,115,22,.85); display: flex; align-items: center; justify-content: center; }
    .piece-info { padding: 10px 12px; }
    .piece-name { font-size: 12px; font-weight: 800; color: var(--ink); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .piece-meta { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
    .estado-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
    .estado-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .piece-date { font-size: 10px; color: var(--ink3); white-space: nowrap; }
    .piece-type { font-size: 10px; color: var(--ink3); }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .cal-day-name { font-size: 10px; font-weight: 800; color: var(--ink3); text-align: center; padding: 4px 0; text-transform: uppercase; letter-spacing: .5px; }
    .cal-cell { min-height: 80px; background: var(--bg); border-radius: 10px; padding: 8px; border: 1px solid transparent; transition: border-color var(--t); }
    .cal-cell.has-event { border-color: var(--border); background: var(--white); }
    .cal-cell.today { border-color: var(--celeste); background: var(--cel-dim); }
    .cal-cell-num { font-size: 11px; font-weight: 800; color: var(--ink3); margin-bottom: 4px; }
    .cal-cell.today .cal-cell-num { color: var(--azul); }
    .cal-event { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 5px; background: var(--azul); color: var(--celeste); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    .cal-event.programado { background: #8B5CF6; color: #EDE9FE; }

    /* Detail overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity var(--t); }
    .overlay.show { opacity: 1; pointer-events: all; }
    .detail-modal { background: var(--white); border-radius: var(--r-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; transform: translateY(16px) scale(.98); transition: transform var(--t); box-shadow: var(--shadow-lg); }
    .overlay.show .detail-modal { transform: translateY(0) scale(1); }
    .detail-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; position: sticky; top: 0; background: var(--white); z-index: 1; }
    .detail-title { font-size: 17px; font-weight: 900; color: var(--ink); letter-spacing: -.3px; }
    .detail-close { width: 30px; height: 30px; border-radius: 8px; background: var(--bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); font-size: 14px; flex-shrink: 0; transition: background var(--t); }
    .detail-close:hover { background: var(--border); }
    .detail-body { padding: 20px 24px; }

    /* Approval actions */
    .approval-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-approve { flex: 1; padding: 13px; background: var(--success); color: #fff; border: none; border-radius: var(--r); font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; transition: opacity var(--t); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-approve:hover { opacity: .88; }
    .btn-changes { flex: 1; padding: 13px; background: var(--white); color: var(--danger); border: 1.5px solid var(--danger); border-radius: var(--r); font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; transition: background var(--t); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-changes:hover { background: #FFF5F5; }
    .btn-approve:disabled, .btn-changes:disabled { opacity: .45; cursor: not-allowed; }
    .changes-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--r); font-size: 13px; font-family: inherit; color: var(--ink); resize: vertical; min-height: 90px; outline: none; transition: border var(--t); display: none; margin-top: 12px; }
    .changes-textarea.show { display: block; }
    .changes-textarea:focus { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,107,107,.15); }

    /* File preview */
    .file-preview-wrap { border-radius: var(--r); overflow: hidden; background: #000; margin-bottom: 16px; }
    .file-preview-wrap img { width: 100%; max-height: 300px; object-fit: contain; display: block; }
    .file-preview-wrap video { width: 100%; max-height: 300px; }
    .file-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); font-size: 12px; font-weight: 700; color: var(--ink2); text-decoration: none; margin-bottom: 16px; transition: background var(--t); }
    .file-link:hover { background: var(--border); }

    /* Historial */
    .historial-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .historial-item:last-child { border-bottom: none; }
    .historial-date { width: 48px; text-align: center; flex-shrink: 0; }
    .historial-date-day { font-size: 20px; font-weight: 900; color: var(--ink); line-height: 1; }
    .historial-date-month { font-size: 10px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: .5px; }

    /* Empty */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; color: var(--ink3); text-align: center; }
    .empty i { font-size: 36px; margin-bottom: 12px; opacity: .4; }
    .empty-title { font-size: 14px; font-weight: 700; color: var(--ink2); margin-bottom: 4px; }
    .empty-sub { font-size: 13px; line-height: 1.5; }

    /* Card base */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 22px 24px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--azul); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; transition: transform .3s cubic-bezier(.4,0,.2,1); z-index: 200; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Loader */
    .page-loader { position: fixed; inset: 0; background: var(--white); display: flex; align-items: center; justify-content: center; z-index: 300; transition: opacity .3s; }
    .page-loader.hide { opacity: 0; pointer-events: none; }
    .loader-dots { display: flex; gap: 6px; }
    .loader-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--ink3); animation: dot .8s ease-in-out infinite; }
    .loader-dots span:nth-child(2) { animation-delay: .15s; }
    .loader-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes dot { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .3s both; }

    /* Confirmed state */
    .confirmed-banner { background: #F0FDF4; border: 1.5px solid #BBF7D0; border-radius: var(--r); padding: 16px 18px; display: flex; align-items: center; gap: 12px; margin-top: 16px; }
    .confirmed-icon { width: 36px; height: 36px; background: var(--success); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; flex-shrink: 0; }
  </style>
</head>

  <div class="loader-dots"><span></span><span></span><span></span></div>
</div>

    <div class="rail-btn" data-tab="formularios" data-tip="Formularios" onclick="switchTab('formularios')" id="nav-formularios"><i class="ti ti-clipboard-list"></i><span class="notif-dot" id="nav-badge-forms"></span></div>
    <div class="rail-btn" data-tab="calendario" data-tip="Calendario" onclick="switchTab('calendario')"></i><i class="ti ti-calendar"></i></div>

      <div class="rail-sep" style="margin:4px 0"></div>

<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-modal" id="detail-modal">
    <div class="detail-head">
      <div class="detail-title" id="detail-title">—</div>
      <button class="detail-close" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient('https://trsbjjagrpvlzvcveiph.supabase.co','sb_publishable_unJoCAXBOTCiLpLkFCG2oA_SdRcKHit')

  const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']
  const MESES_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
  const DAYS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom']
  const ESTADOS = {
    idea:       { name: 'Idea',                    color: '#94A3B8', bg: '#F1F5F9' },
    produccion: { name: 'En producción',            color: '#60A5FA', bg: '#EFF6FF' },
    revision:   { name: 'Revisión interna',         color: '#FBBF24', bg: '#FFFBEB' },
    aprobacion: { name: 'Esperando tu aprobación',  color: '#F97316', bg: '#FFF7ED' },
    publicado:  { name: 'Lista para programar',     color: '#34C759', bg: '#F0FDF4' },
    programado: { name: 'Programado',               color: '#8B5CF6', bg: '#F5F3FF' },
  }

  let currentUser = null, clientData = null, agencyData = null, portalConfig = null
  let pieces = [], calDate = new Date(), currentTab = 'contenido', currentPiece = null
  let portalForms = [], portalClientId = null
  let userName = '', userIni = '?'

  async function init() {
    const params = new URLSearchParams(window.location.search)
    const isPreview = params.get('preview') === 'true'
    const previewClientId = params.get('client_id')

    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = 'client-login.html'; return }
    currentUser = session.user

    let cu = null

    if (isPreview && previewClientId) {
      // Modo preview — carga directo con el client_id sin verificar client_users
      const { data: clientRow } = await supabase
        .from('clients')
        .select('nombre, industria, agencies(nombre)')
        .eq('id', previewClientId)
        .maybeSingle()

      if (!clientRow) { window.location.href = 'client-login.html'; return }

      clientData = clientRow
      agencyData = clientRow.agencies
      cu = {
        client_id: previewClientId,
        nombre: 'Vista previa',
        apellido: '',
        clients: clientRow,
        agencies: clientRow.agencies
      }

      // Banner de preview
      const banner = document.createElement('div')
      banner.style.cssText = 'position:fixed;top:0;left:62px;right:0;background:#F59E0B;color:#fff;font-size:12px;font-weight:800;text-align:center;padding:8px;z-index:200;display:flex;align-items:center;justify-content:center;gap:8px'
      banner.innerHTML = '<i class="ti ti-eye" style="font-size:14px"></i> Modo vista previa — así lo ve el cliente'
      document.body.appendChild(banner)
      document.querySelector('.main').style.marginTop = '36px'

    } else {
      // Flujo normal — verificar que es usuario cliente
      const { data: cuRow } = await supabase
        .from('client_users')
        .select('*, clients(nombre, industria), agencies(nombre)')
        .eq('user_id', currentUser.id)
        .maybeSingle()

      if (!cuRow) { window.location.href = 'client-login.html'; return }
      cu = cuRow
      clientData = cu.clients
      agencyData = cu.agencies
    }

    const { data: config } = await supabase.from('client_portal_config').select('*').eq('client_id', cu.client_id).maybeSingle()
    portalConfig = config || { mostrar_calendario: true, mostrar_en_produccion: true, mostrar_metricas: false, mostrar_historial: true }

    const nombre = cu.nombre || currentUser.email?.split('@')[0] || '?'
    const apellido = cu.apellido || ''
    userName = `${nombre} ${apellido}`.trim()
    userIni = ((nombre[0] || '') + (apellido[0] || '')).toUpperCase() || '?'

    const av = document.getElementById('rail-av')
    av.textContent = userIni
    av.setAttribute('data-tip', userName + ' · Salir')

    if (!portalConfig.mostrar_historial) document.getElementById('nav-historial').style.display = 'none'
    else document.getElementById('nav-historial').style.display = 'flex'
    if (portalConfig.mostrar_metricas) document.getElementById('nav-metricas').style.display = 'flex'

    await loadPieces(cu.client_id)
    await loadForms(cu.client_id)

    const loader = document.getElementById('page-loader')
    loader.classList.add('hide')
    setTimeout(() => loader.remove(), 400)

    renderContenido()
  }

  async function loadPieces(clientId) {
    let query = supabase.from('content_pieces')
      .select('id,titulo,tipo,estado,fecha_publicacion,fecha_entrega,archivo_url,archivo_nombre,aprobacion_comentario,created_at')
      .eq('client_id', clientId).order('created_at', { ascending: false })
    if (!portalConfig.mostrar_en_produccion) query = query.in('estado', ['aprobacion','publicado','programado'])
    const { data } = await query
    pieces = data || []
  }

  window.switchTab = function(tab) {
    currentTab = tab
    document.querySelectorAll('.rail-btn[data-tab]').forEach(n => n.classList.remove('active'))
    document.querySelector(`.rail-btn[data-tab="${tab}"]`)?.classList.add('active')
    const titles = { contenido: 'Contenido', calendario: 'Calendario', historial: 'Historial', metricas: 'Estadísticas', formularios: 'Formularios' }
    document.getElementById('topbar-title').textContent = titles[tab] || tab
    document.getElementById('topbar-actions').innerHTML = ''
    if (tab === 'contenido') renderContenido()
    else if (tab === 'calendario') renderCalendario()
    else if (tab === 'historial') renderHistorial()
    else if (tab === 'metricas') renderMetricas()
    else if (tab === 'formularios') renderFormularios()
  }

  function renderContenido() {
    const content = document.getElementById('main-content')
    const pending = pieces.filter(p => p.estado === 'aprobacion')
    const rest = pieces.filter(p => p.estado !== 'aprobacion')
    const badge = document.getElementById('nav-badge-approval')
    if (badge) badge.classList.toggle('show', pending.length > 0)

    const programadas = pieces.filter(p => p.estado === 'programado').length
    const enProduccion = pieces.filter(p => ['idea','produccion','revision'].includes(p.estado)).length

    // Hora del día
    const h = new Date().getHours()
    const saludo = h < 12 ? 'Buenos días' : h < 19 ? 'Buenas tardes' : 'Buenas noches'

    let html = `<div class="fade-up">
      <div class="welcome-header">
        <div class="welcome-left">
          <div class="welcome-avatar">${userIni}</div>
          <div>
            <div class="welcome-greeting">${saludo}</div>
            <div class="welcome-name">${userName}</div>
            <div class="welcome-agency">${clientData?.nombre || ''} · ${agencyData?.nombre || ''}</div>
          </div>
        </div>
        <div class="welcome-right" style="display:flex;align-items:center;gap:24px">
          <div class="welcome-stat">
            <div class="welcome-stat-val">${pieces.length}</div>
            <div class="welcome-stat-label">Total piezas</div>
          </div>
          <div class="welcome-stat-divider"></div>
          <div class="welcome-stat">
            <div class="welcome-stat-val" style="color:${pending.length > 0 ? '#FED7AA' : 'rgba(142,219,255,.6)'}">${pending.length}</div>
            <div class="welcome-stat-label">Para aprobar</div>
          </div>
          <div class="welcome-stat-divider"></div>
          <div class="welcome-stat">
            <div class="welcome-stat-val" style="color:#C4B5FD">${programadas}</div>
            <div class="welcome-stat-label">Programadas</div>
          </div>
        </div>
      </div>`

    if (pending.length > 0) {
      html += `<div class="approval-banner">
        <div class="approval-banner-icon"><i class="ti ti-clock"></i></div>
        <div>
          <div class="approval-banner-title">${pending.length} pieza${pending.length > 1 ? 's' : ''} esperando tu aprobación</div>
          <div class="approval-banner-sub">Revisalas y danos tu feedback para poder avanzar.</div>
        </div>
        <button class="approval-banner-btn" onclick="openPiece('${pending[0].id}')">
          <i class="ti ti-eye" style="font-size:13px"></i> Ver ahora
        </button>
      </div>`
    }

    if (pending.length > 0) {
      html += `<div class="section-header"><div>
        <div class="section-title">Esperando tu aprobación</div>
        <div class="section-sub">Revisá cada pieza y aprobala o pedí cambios</div>
      </div></div>
      <div class="pieces-grid" style="margin-bottom:28px">${pending.map(p => pieceCardHTML(p)).join('')}</div>`
    }

    if (rest.length > 0) {
      html += `<div class="section-header"><div>
        <div class="section-title">Todas las piezas</div>
        <div class="section-sub">${rest.length} pieza${rest.length !== 1 ? 's' : ''}</div>
      </div></div>
      <div class="pieces-grid">${rest.map(p => pieceCardHTML(p)).join('')}</div>`
    }

    if (pieces.length === 0) {
      html += `<div class="card"><div class="empty"><i class="ti ti-photo"></i>
        <div class="empty-title">Sin piezas todavía</div>
        <div class="empty-sub">Tu agencia todavía no cargó piezas.</div>
      </div></div>`
    }

    html += '</div>'
    content.innerHTML = html
  }

  function pieceCardHTML(p) {
    const estado = ESTADOS[p.estado] || { name: p.estado, color: '#94A3B8', bg: '#F1F5F9' }
    const isImage = p.archivo_url && /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(p.archivo_url)
    const isVideo = p.archivo_url && /\.(mp4|mov|webm|avi)$/i.test(p.archivo_url)
    const needsApproval = p.estado === 'aprobacion'

    const iconName = isVideo || p.tipo === 'Video' || p.tipo === 'Reel' ? 'ti-video' : 'ti-photo'

    const thumbContent = isImage
      ? `<img src="${p.archivo_url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<i class=\\'ti ${iconName}\\' style=\\'font-size:28px;color:var(--ink3)\\'></i>'">`
      : `<i class="ti ${iconName}" style="font-size:28px;color:var(--ink3)"></i>`

    const overlay = needsApproval
      ? `<div class="piece-thumb-overlay"><span style="font-size:11px;font-weight:800;color:#fff;display:flex;align-items:center;gap:5px"><i class="ti ti-eye" style="font-size:13px"></i> Revisar</span></div>`
      : ''

    const fechaStr = p.fecha_publicacion
      ? new Date(p.fecha_publicacion).toLocaleDateString('es-AR', { day: 'numeric', month: 'short' })
      : (p.tipo || '')

    return `<div class="piece-card ${needsApproval ? 'needs-approval' : ''}" onclick="openPiece('${p.id}')">
      <div class="piece-thumb">${thumbContent}${overlay}</div>
      <div class="piece-info">
        <div class="piece-name">${p.titulo}</div>
        <div class="piece-meta">
          <span class="estado-badge" style="background:${estado.bg};color:${estado.color}">
            <span class="estado-dot" style="background:${estado.color}"></span>${estado.name}
          </span>
          <span class="piece-date">${fechaStr}</span>
        </div>
      </div>
    </div>`
  }

  function renderCalendario() {
    if (!portalConfig.mostrar_calendario) {
      document.getElementById('main-content').innerHTML = `<div class="card"><div class="empty"><i class="ti ti-lock"></i><div class="empty-title">No disponible</div><div class="empty-sub">Tu agencia no habilitó esta sección.</div></div></div>`
      return
    }
    const content = document.getElementById('main-content')
    const year = calDate.getFullYear(), month = calDate.getMonth()
    const firstDay = new Date(year, month, 1).getDay()
    const daysInMonth = new Date(year, month + 1, 0).getDate()
    const today = new Date()
    const scheduled = pieces.filter(p => p.fecha_publicacion)
    const monthPieces = scheduled.filter(p => { const d = new Date(p.fecha_publicacion); return d.getFullYear() === year && d.getMonth() === month })

    document.getElementById('topbar-actions').innerHTML = `
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="calNav(-1)" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);cursor:pointer;font-family:inherit" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='var(--white)'"><i class="ti ti-chevron-left" style="font-size:13px"></i></button>
        <div style="font-size:14px;font-weight:800;color:var(--ink);min-width:140px;text-align:center">${MESES_FULL[month]} ${year}</div>
        <button onclick="calNav(1)" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);cursor:pointer;font-family:inherit" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='var(--white)'"><i class="ti ti-chevron-right" style="font-size:13px"></i></button>
      </div>`

    let html = `<div class="fade-up">
      <div class="stats-row" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-label">Este mes</div><div class="stat-value">${monthPieces.length}</div><div class="stat-sub">programadas</div></div>
        <div class="stat-card"><div class="stat-label">Publicadas</div><div class="stat-value" style="color:var(--success)">${monthPieces.filter(p=>new Date(p.fecha_publicacion)<=today).length}</div><div class="stat-sub">hasta hoy</div></div>
        <div class="stat-card"><div class="stat-label">Próximas</div><div class="stat-value" style="color:#8B5CF6">${monthPieces.filter(p=>new Date(p.fecha_publicacion)>today).length}</div><div class="stat-sub">por publicar</div></div>
      </div>
      <div class="card"><div class="cal-grid">`

    DAYS.forEach(d => { html += `<div class="cal-day-name">${d}</div>` })
    const startDay = firstDay === 0 ? 6 : firstDay - 1
    for (let i = 0; i < startDay; i++) html += '<div class="cal-cell"></div>'
    for (let day = 1; day <= daysInMonth; day++) {
      const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year
      const dayPieces = scheduled.filter(p => { const d = new Date(p.fecha_publicacion); return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day })
      html += `<div class="cal-cell ${isToday ? 'today' : ''} ${dayPieces.length > 0 ? 'has-event' : ''}">
        <div class="cal-cell-num">${day}</div>
        ${dayPieces.slice(0,2).map(p => `<div class="cal-event ${p.estado}" onclick="event.stopPropagation();openPiece('${p.id}')">${p.titulo}</div>`).join('')}
        ${dayPieces.length > 2 ? `<div style="font-size:9px;color:var(--ink3);font-weight:700">+${dayPieces.length - 2} más</div>` : ''}
      </div>`
    }
    html += '</div></div></div>'
    content.innerHTML = html
  }

  window.calNav = function(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendario() }

  function renderHistorial() {
    document.getElementById('topbar-actions').innerHTML = ''
    const published = pieces.filter(p => p.estado === 'programado' && p.fecha_publicacion).sort((a,b) => new Date(b.fecha_publicacion) - new Date(a.fecha_publicacion))
    let html = '<div class="fade-up"><div class="card">'
    if (published.length === 0) {
      html += `<div class="empty"><i class="ti ti-history"></i><div class="empty-title">Sin publicaciones todavía</div><div class="empty-sub">Acá vas a ver el historial de todo lo publicado.</div></div>`
    } else {
      published.forEach(p => {
        const d = new Date(p.fecha_publicacion)
        html += `<div class="historial-item" onclick="openPiece('${p.id}')" style="cursor:pointer">
          <div class="historial-date"><div class="historial-date-day">${d.getDate()}</div><div class="historial-date-month">${MESES[d.getMonth()]}</div></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:800;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.titulo}</div>
            <div style="display:flex;align-items:center;gap:8px">
              ${p.tipo ? `<span style="font-size:11px;color:var(--ink3);font-weight:700;background:var(--bg);padding:2px 8px;border-radius:6px">${p.tipo}</span>` : ''}
              <span style="font-size:11px;color:var(--ink3)">${d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>
            </div>
          </div>
          <i class="ti ti-chevron-right" style="font-size:14px;color:var(--ink3)"></i>
        </div>`
      })
    }
    html += '</div></div>'
    document.getElementById('main-content').innerHTML = html
  }

  function renderMetricas() {
    document.getElementById('topbar-actions').innerHTML = ''
    document.getElementById('main-content').innerHTML = `<div class="card"><div class="empty"><i class="ti ti-chart-bar"></i><div class="empty-title">Estadísticas</div><div class="empty-sub">Tu agencia cargará las métricas de cada pieza publicada.</div></div></div>`
  }

  window.openPiece = function(id) {
    currentPiece = pieces.find(p => p.id === id)
    if (!currentPiece) return
    const p = currentPiece
    const estado = ESTADOS[p.estado] || { name: p.estado, color: '#94A3B8', bg: '#F1F5F9' }
    const isImage = p.archivo_url && /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(p.archivo_url)
    const isVideo = p.archivo_url && /\.(mp4|mov|webm|avi)$/i.test(p.archivo_url)

    const fileBlock = p.archivo_url
      ? `<div class="file-preview-wrap">${isImage ? `<img src="${p.archivo_url}" alt="${p.titulo}">` : ''}${isVideo ? `<video controls src="${p.archivo_url}"></video>` : ''}</div>
         ${!isImage && !isVideo ? `<a href="${p.archivo_url}" target="_blank" class="file-link"><i class="ti ti-external-link" style="font-size:13px"></i> Ver archivo</a>` : ''}`
      : ''

    const approvalBlock = p.estado === 'aprobacion'
      ? `<div style="background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:var(--r);padding:14px 16px;margin-bottom:16px">
          <div style="font-size:11px;font-weight:800;color:#C2410C;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px"><i class="ti ti-clock" style="font-size:11px"></i> Esperando tu aprobación</div>
          <div style="font-size:13px;color:#7C2D12;line-height:1.6">Revisá el archivo y decinos si está todo bien o si necesitás cambios.</div>
        </div>

          <button class="btn-approve" onclick="approvepiece('${p.id}')"><i class="ti ti-check" style="font-size:15px"></i> Aprobar</button>
          <button class="btn-changes" onclick="showChangesInput()"><i class="ti ti-refresh" style="font-size:15px"></i> Pedir cambios</button>
        </div>
        <textarea class="changes-textarea" id="changes-input" placeholder="Describí qué cambios necesitás..."></textarea>
        <button id="btn-send-changes" onclick="sendChanges('${p.id}')" style="display:none;width:100%;margin-top:10px;padding:12px;background:var(--danger);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:none">Enviar cambios</button>`
      : ''

    const cambiosAlert = p.aprobacion_comentario
      ? `<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);padding:14px 16px;margin-bottom:16px">
          <div style="font-size:10px;font-weight:800;color:var(--danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px"><i class="ti ti-refresh" style="font-size:10px"></i> Cambios solicitados anteriormente</div>
          <div style="font-size:13px;color:#DC2626;line-height:1.6">${p.aprobacion_comentario}</div>

      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
        <span class="estado-badge" style="background:${estado.bg};color:${estado.color}"><span class="estado-dot" style="background:${estado.color}"></span>${estado.name}</span>
        ${p.tipo ? `<span class="piece-type">${p.tipo}</span>` : ''}
        ${p.fecha_publicacion ? `<span style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--bg);color:var(--ink2);display:inline-flex;align-items:center;gap:4px"><i class="ti ti-calendar" style="font-size:10px"></i> ${new Date(p.fecha_publicacion).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</span>` : ''}

  window.closeDetail = function() {
    document.getElementById('detail-overlay').classList.remove('show')
    currentPiece = null
  }

  window.showChangesInput = function() {
    const textarea = document.getElementById('changes-input')
    const btn = document.getElementById('btn-send-changes')
    textarea.classList.add('show')
    btn.style.display = 'block'
    textarea.focus()
  }

  window.approvepiece = async function(pieceId) {
    const btn = document.querySelector('.btn-approve')
    const btnC = document.querySelector('.btn-changes')
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="font-size:15px"></i> Aprobando...' }
    if (btnC) btnC.disabled = true
    const { error } = await supabase.from('content_pieces').update({ estado: 'publicado', aprobacion_comentario: null }).eq('id', pieceId)
    if (!error) {
      const piece = pieces.find(p => p.id === pieceId)
      if (piece) { piece.estado = 'publicado'; piece.aprobacion_comentario = null }
      // Mostrar confirmación visual en el modal
      document.getElementById('detail-body').innerHTML = `
        <div class="confirmed-banner">
          <div class="confirmed-icon"><i class="ti ti-circle-check"></i></div>
          <div>
            <div style="font-size:14px;font-weight:900;color:#166534;margin-bottom:3px">Pieza aprobada</div>
            <div style="font-size:12px;color:#15803D">La agencia ya puede avanzar con la publicación.</div>
          </div>
        </div>`
      setTimeout(() => { closeDetail(); renderContenido() }, 1800)
    } else {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-check" style="font-size:15px"></i> Aprobar' }
      if (btnC) btnC.disabled = false
      showToast('Error al aprobar. Intentá de nuevo.')
    }
  }

  window.sendChanges = async function(pieceId) {
    const comentario = document.getElementById('changes-input')?.value.trim()
    if (!comentario) { document.getElementById('changes-input')?.focus(); return }
    const btn = document.getElementById('btn-send-changes')
    if (btn) { btn.disabled = true; btn.textContent = 'Enviando...' }
    const { error } = await supabase.from('content_pieces').update({ estado: 'revision', aprobacion_comentario: comentario }).eq('id', pieceId)
    if (!error) {
      const piece = pieces.find(p => p.id === pieceId)
      if (piece) { piece.estado = 'revision'; piece.aprobacion_comentario = comentario }
      document.getElementById('detail-body').innerHTML = `
        <div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:12px">
          <div style="width:36px;height:36px;background:var(--danger);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0"><i class="ti ti-send"></i></div>
          <div>
            <div style="font-size:14px;font-weight:900;color:#991B1B;margin-bottom:3px">Cambios enviados</div>
            <div style="font-size:12px;color:#DC2626">La agencia ya recibió tu feedback y va a trabajar en los cambios.</div>
          </div>
        </div>`
      setTimeout(() => { closeDetail(); renderContenido() }, 1800)
    } else {
      if (btn) { btn.disabled = false; btn.textContent = 'Enviar cambios' }
      showToast('Error al enviar. Intentá de nuevo.')
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 2800)
  }

  window.handleSignOut = async function() {
    await supabase.auth.signOut()
    window.location.href = 'client-login.html'
  }

  async function loadForms(clientId) {
    portalClientId = clientId
    try {
      const { data } = await supabase
        .from('form_assignments')
        .select('*, form_templates(nombre, descripcion, preguntas)')
        .eq('client_id', clientId)
        .order('enviado_at', { ascending: false })

      portalForms = data || []

      // Badge en el rail si hay formularios pendientes
      const pendientes = portalForms.filter(f => f.estado === 'pendiente').length
      const badge = document.getElementById('nav-badge-forms')
      if (badge) badge.classList.toggle('show', pendientes > 0)

    } catch(e) {
      portalForms = []
    }

    const content = document.getElementById('main-content')

    if (!portalForms.length) {
      content.innerHTML = `<div style="padding:40px 32px;max-width:700px;margin:0 auto">
        <div style="text-align:center;padding:60px 0">
          <i class="ti ti-clipboard-list" style="font-size:48px;color:var(--ink3);opacity:.3;display:block;margin-bottom:16px"></i>
          <div style="font-size:16px;font-weight:800;color:var(--ink);margin-bottom:6px">Sin formularios por ahora</div>

        </div>

      return diff !== 0 ? diff : new Date(b.enviado_at) - new Date(a.enviado_at)
    })

    const estadoBadge = {
      pendiente: { label: 'Pendiente', bg: '#FFF7ED', color: '#C2410C', dot: '#F97316' },
      visto:     { label: 'En progreso', bg: '#FFFBEB', color: '#92400E', dot: '#F59E0B' },
      completado:{ label: 'Completado', bg: '#F0FDF4', color: '#166534', dot: '#22C55E' }
    }

    content.innerHTML = `<div style="padding:32px;max-width:700px;margin:0 auto">
      <div style="font-size:18px;font-weight:900;color:var(--ink);letter-spacing:-.3px;margin-bottom:4px">Formularios</div>
      <div style="font-size:13px;color:var(--ink3);margin-bottom:24px">Información que tu agencia necesita de tu parte</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${sorted.map(f => {
          const badge = estadoBadge[f.estado] || estadoBadge.pendiente
          const fecha = new Date(f.enviado_at).toLocaleDateString('es-AR', { day: 'numeric', month: 'long' })
          const preguntas = f.form_templates?.preguntas || []
          const isCompletado = f.estado === 'completado'
          return `<div style="background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:20px;${!isCompletado ? 'cursor:pointer;' : ''}transition:box-shadow .15s,border-color .15s" ${!isCompletado ? `onclick="openPortalForm('${f.id}')"` : ''} ${!isCompletado ? `onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.08)';this.style.borderColor='#CBD5E0'" onmouseout="this.style.boxShadow='';this.style.borderColor='#E2E8F0'"` : ''}>
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
              <div style="flex:1;min-width:0">

                ${f.form_templates?.descripcion ? `<div style="font-size:12px;color:var(--ink3);margin-bottom:8px">${f.form_templates.descripcion}</div>` : ''}
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                  <span style="font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:${badge.bg};color:${badge.color};display:flex;align-items:center;gap:4px"><span style="width:5px;height:5px;border-radius:50%;background:${badge.dot};display:inline-block"></span>${badge.label}</span>
                  <span style="font-size:11px;color:var(--ink3)">${preguntas.length} pregunta${preguntas.length !== 1 ? 's' : ''} · ${fecha}</span>
                </div>
              </div>
              ${!isCompletado
                ? `<div style="flex-shrink:0;width:36px;height:36px;border-radius:10px;background:#FFF7ED;display:flex;align-items:center;justify-content:center">
                    <i class="ti ti-arrow-right" style="font-size:16px;color:#F97316"></i>
                  </div>`
                : `<div style="flex-shrink:0;width:36px;height:36px;border-radius:10px;background:#F0FDF4;display:flex;align-items:center;justify-content:center">

  window.openPortalForm = async function(assignmentId) {
    const assignment = portalForms.find(f => f.id === assignmentId)
    if (!assignment) return

    const preguntas = assignment.form_templates?.preguntas || []
    const nombre = assignment.form_templates?.nombre || 'Formulario'
    const descripcion = assignment.form_templates?.descripcion || ''

    // Marcar como visto si estaba pendiente
    if (assignment.estado === 'pendiente') {
      assignment.estado = 'visto'
      await supabase
        .from('form_assignments')
        .update({ estado: 'visto', visto_at: new Date().toISOString() })
        .eq('id', assignmentId)
      const badge = document.getElementById('nav-badge-forms')
      const pendientes = portalForms.filter(f => f.estado === 'pendiente').length
      if (badge) badge.classList.toggle('show', pendientes > 0)
    }

    const content = document.getElementById('main-content')
    content.innerHTML = `<div style="padding:32px;max-width:680px;margin:0 auto">
      <button onclick="renderFormularios()" style="display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:13px;font-weight:700;padding:0;margin-bottom:24px;font-family:inherit;transition:color var(--t)" onmouseover="this.style.color='var(--ink)'" onmouseout="this.style.color='var(--ink3)'">
        <i class="ti ti-arrow-left" style="font-size:15px"></i> Formularios
      </button>
      <div style="font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-.3px;margin-bottom:${descripcion ? '6px' : '24px'}">${nombre}</div>
      ${descripcion ? `<div style="font-size:13px;color:var(--ink3);margin-bottom:24px">${descripcion}</div>` : ''}

      <form id="portal-form-${assignmentId}" onsubmit="event.preventDefault();submitPortalForm('${assignmentId}')">
        <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:28px">
          ${preguntas.map((p, i) => `
            <div style="background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:18px 20px">
              <div style="font-size:13px;font-weight:800;color:var(--ink);margin-bottom:10px">
                ${i+1}. ${p.pregunta}${p.requerida ? ' <span style="color:#F97316">*</span>' : ''}
              </div>
              ${renderFormInput(p)}
            </div>`).join('')}
        </div>
        <button type="submit" style="width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:900;border:none;background:#0A2540;color:#8EDBFF;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity var(--t)" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'" id="btn-submit-form-${assignmentId}">
          <i class="ti ti-send" style="font-size:15px"></i> Enviar respuestas
        </button>
      </form>
    </div>`
  }

  function renderFormInput(p) {
    const baseInput = 'width:100%;background:#fff;border:1.5px solid #E2E8F0;border-radius:9px;color:var(--ink);font-family:inherit;outline:none;transition:border-color var(--t);'
    const focusStyle = `onfocus="this.style.borderColor='#0A2540'" onblur="this.style.borderColor='#E2E8F0'"`

    if (p.tipo === 'texto_corto') {
      return `<input type="text" name="${p.id}" ${p.requerida ? 'required' : ''} placeholder="Tu respuesta..." style="${baseInput}padding:10px 13px;font-size:13px;" ${focusStyle}>`
    }
    if (p.tipo === 'texto_largo') {
      return `<textarea name="${p.id}" ${p.requerida ? 'required' : ''} placeholder="Tu respuesta..." style="${baseInput}padding:10px 13px;font-size:13px;min-height:100px;resize:vertical;" ${focusStyle}></textarea>`
    }
    if (p.tipo === 'opcion_unica') {
      return `<div style="display:flex;flex-direction:column;gap:8px">${(p.opciones||[]).map(o => `
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 13px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:9px;transition:border-color var(--t)" onmouseover="this.style.borderColor='#0A2540'" onmouseout="this.style.borderColor='#E2E8F0'">
          <input type="radio" name="${p.id}" value="${o}" ${p.requerida ? 'required' : ''} style="accent-color:#0A2540;width:16px;height:16px;flex-shrink:0">
          <span style="font-size:13px;color:var(--ink)">${o}</span>
        </label>`).join('')}</div>`
    }
    if (p.tipo === 'opcion_multiple') {
      return `<div style="display:flex;flex-direction:column;gap:8px">${(p.opciones||[]).map(o => `
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 13px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:9px;transition:border-color var(--t)" onmouseover="this.style.borderColor='#0A2540'" onmouseout="this.style.borderColor='#E2E8F0'">
          <input type="checkbox" name="${p.id}" value="${o}" style="accent-color:#0A2540;width:16px;height:16px;flex-shrink:0">
          <span style="font-size:13px;color:var(--ink)">${o}</span>
        </label>`).join('')}</div>`
    }
    return `<input type="text" name="${p.id}" placeholder="Tu respuesta..." style="${baseInput}padding:10px 13px;font-size:13px;" ${focusStyle}>`
  }

  window.submitPortalForm = async function(assignmentId) {
    const assignment = portalForms.find(f => f.id === assignmentId)
    if (!assignment) return

    const preguntas = assignment.form_templates?.preguntas || []
    const form = document.getElementById(`portal-form-${assignmentId}`)
    const btn = document.getElementById(`btn-submit-form-${assignmentId}`)
    const respuestas = {}

    // Recolectar respuestas
    let valid = true
    preguntas.forEach(p => {
      if (p.tipo === 'opcion_multiple') {
        const checked = [...form.querySelectorAll(`input[name="${p.id}"]:checked`)].map(el => el.value)
        if (p.requerida && checked.length === 0) { valid = false }
        respuestas[p.id] = checked
      } else if (p.tipo === 'opcion_unica') {
        const checked = form.querySelector(`input[name="${p.id}"]:checked`)
        if (p.requerida && !checked) { valid = false }
        respuestas[p.id] = checked?.value || ''
      } else {
        const el = form.querySelector(`[name="${p.id}"]`)
        if (p.requerida && !el?.value?.trim()) { valid = false }
        respuestas[p.id] = el?.value?.trim() || ''
      }
    })

    if (!valid) {
      // Highlight campos vacíos requeridos
      preguntas.filter(p => p.requerida).forEach(p => {
        const el = form.querySelector(`[name="${p.id}"]`)
        if (el && !el.value) el.style.borderColor = '#F97316'
      })
      return
    }

    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="font-size:15px"></i> Enviando...' }

    try {
      // Guardar respuesta
      const { error: rErr } = await supabase
        .from('form_responses')
        .insert({
          assignment_id: assignmentId,
          client_user_id: currentUser.id,
          respuestas
        })
      if (rErr) throw rErr

      // Actualizar estado a completado
      const { error: aErr } = await supabase
        .from('form_assignments')
        .update({ estado: 'completado', completado_at: new Date().toISOString() })
        .eq('id', assignmentId)
      if (aErr) throw aErr

      // Actualizar cache local
      assignment.estado = 'completado'
      const badge = document.getElementById('nav-badge-forms')
      const pendientes = portalForms.filter(f => f.estado === 'pendiente').length
      if (badge) badge.classList.toggle('show', pendientes > 0)

      // Mostrar confirmación
      const content = document.getElementById('main-content')
      content.innerHTML = `<div style="padding:32px;max-width:680px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center">
        <div style="width:64px;height:64px;border-radius:20px;background:#F0FDF4;display:flex;align-items:center;justify-content:center;margin-bottom:20px">
          <i class="ti ti-circle-check" style="font-size:32px;color:#22C55E"></i>
        </div>
        <div style="font-size:22px;font-weight:900;color:var(--ink);letter-spacing:-.3px;margin-bottom:8px">¡Respuestas enviadas!</div>
        <div style="font-size:14px;color:var(--ink3);margin-bottom:28px">Tu agencia ya puede ver tus respuestas.</div>
        <button onclick="renderFormularios()" style="padding:12px 24px;border-radius:12px;font-size:13px;font-weight:800;border:1.5px solid #E2E8F0;background:#fff;color:var(--ink);cursor:pointer;font-family:inherit;transition:border-color var(--t)" onmouseover="this.style.borderColor='#0A2540'" onmouseout="this.style.borderColor='#E2E8F0'">
          Volver a formularios
        </button>
      </div>`

    } catch(e) {
      console.error('submitPortalForm error:', e)
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-send" style="font-size:15px"></i> Enviar respuestas' }
    }
  }

</script>
</body>
