<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agencia OS — Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="auth-page">
  <div class="card">

    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 22 22">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="12" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="12" width="7" height="7" rx="1.5"/>
          <rect x="12" y="12" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <span class="logo-name">Agencia OS</span>
    </div>

    <h1 class="card-title">Bienvenido de vuelta</h1>
    <p class="card-sub">Ingresá con tu cuenta para continuar.</p>

    <div class="error-msg" id="error"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">
      <span id="btn-text">Iniciar sesión</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="card-footer">
      ¿No tenés cuenta? <a href="register.html">Registrate gratis</a>
    </div>

  </div>
</div>

<script type="module">
  import { supabase, redirectIfAuth } from './supabase.js'

  // Redirigir si ya está logueado
  redirectIfAuth()

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin()
  })

  window.handleLogin = async function() {
    const email    = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const btn      = document.getElementById('btn-login')
    const spinner  = document.getElementById('spinner')
    const btnText  = document.getElementById('btn-text')
    const errorEl  = document.getElementById('error')

    errorEl.classList.remove('show')

    if (!email || !password) {
      showError('Completá todos los campos.')
      return
    }

    // Loading
    btn.disabled = true
    spinner.style.display = 'block'
    btnText.textContent = 'Ingresando...'

    const { error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) {
      btn.disabled = false
      spinner.style.display = 'none'
      btnText.textContent = 'Iniciar sesión'

      if (error.message.includes('Invalid login')) {
        showError('Email o contraseña incorrectos.')
      } else {
        showError('Ocurrió un error. Intentá de nuevo.')
      }
      return
    }

    // Verificar si tiene agencia
    const { data: { user } } = await supabase.auth.getUser()
    const { data: membership } = await supabase
      .from('agency_members')
      .select('id, status')
      .eq('user_id', user.id)
      .maybeSingle()

    if (!membership) {
      window.location.href = 'onboarding.html'
    } else if (membership.status === 'pending') {
      window.location.href = 'waiting.html'
    } else {
      window.location.href = 'dashboard.html'
    }
  }

  function showError(msg) {
    const el = document.getElementById('error')
    el.textContent = msg
    el.classList.add('show')
  }
</script>

</body>
</html>
